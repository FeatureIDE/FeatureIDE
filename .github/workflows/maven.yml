# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven
        
    - name: Build with Maven
      run: mvn -B compile --file pom.xml

  build-update-site:
    if: ${{ github.event.pull_request.merged }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Build update site only
        run: mvn -B -Pnu package

      - name: Upload update site artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-site
          path: deploy/NightlyUpdate/target/repository


  deploy-update-site:
    runs-on: ubuntu-latest
    needs: build-update-site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Create artifact download directory
        run: mkdir update-site
        
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: update-site
          path: update-site/
          
      - name: Add .nojekyll
        run: touch .nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: update-site/
        
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
